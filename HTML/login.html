<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KM Root Solutions – Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<script>
  // Si l’UI est servie depuis le serveur Node sur le port 3001, utilise /api pour éviter les appels cross-origin.
  window.API_BASE = window.location.port === '3001'
    ? '/api'
    : `${window.location.protocol}//${window.location.hostname}:3001/api`;
</script>
<main style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
  <div style="width:min(520px,92vw); background:#111827; color:white; border:1px solid rgba(126,217,87,0.25); border-radius:12px; padding:20px; box-shadow:0 10px 40px rgba(0,0,0,0.35);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <div style="font-family:Montserrat, sans-serif; font-weight:900; letter-spacing:0.05em;">LOGIN ADMIN</div>
      <a href="index.html" style="color:rgba(255,255,255,0.7); text-decoration:none; font-weight:700;">Retour</a>
    </div>

    <div style="display:grid; grid-template-columns:1fr; gap:12px;">
      <div>
        <label style="display:block; font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:rgba(255,255,255,0.7); margin-bottom:6px;">Email</label>
        <input id="loginEmail" type="email" placeholder="admin@kmroot.com" style="width:100%; padding:10px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.12); outline:none; background:#0b1120; color:white;"/>
      </div>

      <div>
        <label style="display:block; font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:rgba(255,255,255,0.7); margin-bottom:6px;">Mot de passe</label>
        <input id="loginPassword" type="password" placeholder="admin123" style="width:100%; padding:10px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.12); outline:none; background:#0b1120; color:white;"/>
      </div>

      <div id="loginError" style="display:none; color:#fca5a5; font-weight:700; font-size:13px;">Erreur</div>

      <button id="loginBtn" class="btn-green" style="width:100%; padding:12px 28px;">Se connecter</button>

      <div style="font-size:12px; color:rgba(255,255,255,0.7); line-height:1.5;">
        Démo : <b>admin@kmroot.com</b> / <b>admin123</b> (à changer dans les variables d’environnement côté serveur).
      </div>
    </div>
  </div>
</main>

<script>
  async function apiFetch(path, { method = 'GET', body = null } = {}) {
    const res = await fetch(path, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : null
    });
    const ct = res.headers.get('content-type') || '';
    const data = ct.includes('application/json') ? await res.json().catch(() => null) : await res.text().catch(() => null);
    if (!res.ok) throw new Error(data?.error || `http_${res.status}`);
    return data;
  }

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value || '';
    const errEl = document.getElementById('loginError');
    try {
      errEl.style.display = 'none';
      const data = await apiFetch('/api/auth/login', { method: 'POST', body: { email, password } });
      localStorage.setItem('adminToken', data.token);
      window.location.href = 'admin.html';
    } catch (e) {
      errEl.textContent = `Connexion impossible: ${e.message}`;
      errEl.style.display = 'block';
    }
  });
</script>
</body>
</html>
